<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Google Workspace Icons</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="brand">
        <div class="logo-wrapper">
          <img src="../../assets/extension/icon-48.png" alt="" class="hero-icon">
          <span id="extension-status-glow" class="status-glow"></span>
        </div>
        <div>
          <p class="eyebrow">Extension Status: <span id="extension-status-text">Active</span></p>
          <h1>Classic Google Workspace Icons</h1>
        </div>
      </div>
    </header>

    <section class="card master-control-card">
      <div class="toggle-row">
        <div>
          <span class="item-name">Master Switch</span>
          <span class="item-meta">Enable flat icon sets and NetRequest redirects</span>
        </div>
        <label class="switch" for="extension-enabled">
          <input id="extension-enabled" class="toggle-input" type="checkbox">
          <span class="toggle-ui" aria-hidden="true"></span>
        </label>
      </div>
      <p id="save-status" class="status-copy" aria-live="polite"></p>
    </section>

    <section class="card">
      <div class="card-heading">
        <h2>Supported Apps</h2>
        <span id="app-count" class="pill"></span>
      </div>
      <ul id="app-list" class="app-grid"></ul>
    </section>

    <footer class="popup-footer">
      <a href="https://feedback.lisova-minds.pro/" target="_blank" class="footer-link">
        <svg class="link-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          <polyline points="15 3 21 3 21 9"></polyline>
          <line x1="10" y1="14" x2="21" y2="3"></line>
        </svg>
        Report an Issue
      </a>
    </footer>
  </main>

  <script src="../shared/runtime.js"></script>
  <script src="../shared/app-registry.js"></script>
  <script src="../shared/apps.js"></script>
  <script src="../shared/settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
