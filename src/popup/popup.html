<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make Google Flat Again</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="brand">
        <div class="logo-wrapper">
          <img src="../../assets/extension/icon-48.png" alt="" class="hero-icon">
          <span id="extension-status-glow" class="status-glow"></span>
        </div>
        <div>
          <p class="eyebrow">Extension Status: <span id="extension-status-text">Active</span></p>
          <h1>Make Google Flat</h1>
        </div>
      </div>
    </header>

    <section class="card master-control-card">
      <div class="toggle-row">
        <div>
          <span class="item-name">Master Switch</span>
          <span class="item-meta">Enable flat icon sets and NetRequest redirects</span>
        </div>
        <label class="switch" for="extension-enabled">
          <input id="extension-enabled" class="toggle-input" type="checkbox">
          <span class="toggle-ui" aria-hidden="true"></span>
        </label>
      </div>
      <p id="save-status" class="status-copy" aria-live="polite"></p>
    </section>

    <section class="card">
      <div class="card-heading">
        <h2>Supported Apps</h2>
        <span id="app-count" class="pill"></span>
      </div>
      <ul id="app-list" class="app-grid"></ul>
    </section>


  </main>

  <script src="../shared/runtime.js"></script>
  <script src="../shared/app-registry.js"></script>
  <script src="../shared/apps.js"></script>
  <script src="../shared/settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
