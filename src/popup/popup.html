<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make Google Flat Again</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="brand">
        <img src="../../assets/extension/icon-48.png" alt="" class="hero-icon">
        <div>
          <p class="eyebrow">Firefox-first</p>
          <h1>Make Google Flat Again</h1>
        </div>
      </div>
      <p class="summary">Restores classic Google Workspace icons in Firefox.</p>
    </header>

    <section class="card">
      <div class="card-heading">
        <h2>Supported Apps</h2>
        <span id="app-count" class="pill"></span>
      </div>
      <ul id="app-list" class="item-list"></ul>
    </section>

    <section class="card">
      <div class="card-heading">
        <h2>Guard Rails</h2>
        <span id="guard-count" class="pill pill-muted"></span>
      </div>
      <ul id="guard-list" class="guard-list"></ul>
    </section>

  </main>

  <script src="../shared/runtime.js"></script>
  <script src="../shared/apps.js"></script>
  <script src="../shared/guards.js"></script>
  <script src="../shared/settings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
