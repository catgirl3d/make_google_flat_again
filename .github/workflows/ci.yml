name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
      - "*.*.*"
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run test suite
        run: npm test

  package:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate release tag against manifest version
        run: npm run validate:release-tag -- "${{ github.ref_name }}"

      - name: Package release artifacts
        run: npm run package

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: make-google-flat-again-packages
          path: |
            dist/*.xpi
            dist/*.zip
          if-no-files-found: error
