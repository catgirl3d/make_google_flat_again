name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
      - "*.*.*"
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run test suite
        run: npm test

  package:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release tag against manifest version
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"

          if ($tagName -notmatch '^v?\d+\.\d+\.\d+$') {
            throw "Release tag must look like v1.2.3 or 1.2.3. Received '$tagName'."
          }

          $manifestVersion = (Get-Content -LiteralPath "manifests/base.json" -Raw | ConvertFrom-Json).version
          $normalizedTag = $tagName

          if ($normalizedTag.StartsWith("v")) {
            $normalizedTag = $normalizedTag.Substring(1)
          }

          if ($normalizedTag -ne $manifestVersion) {
            throw "Release tag '$tagName' does not match manifests/base.json version '$manifestVersion'."
          }

      - name: Package Firefox build
        run: npm run package:firefox

      - name: Package Chrome build
        run: npm run package:chrome

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: make-google-flat-again-packages
          path: |
            dist/*.xpi
            dist/*.zip
          if-no-files-found: error
